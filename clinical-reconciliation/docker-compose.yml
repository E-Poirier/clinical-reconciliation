# Phase 5: Docker Compose - Backend + Frontend
# Run: docker compose up --build
# Frontend: http://localhost:5173  |  Backend API: http://localhost:8000
#
# Prerequisites: Copy backend/.env.example to backend/.env and set API_KEY, ANTHROPIC_API_KEY

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BACKEND=http://backend:8000
    depends_on:
      - backend
